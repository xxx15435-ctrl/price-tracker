name: Price Tracker

# 設定觸發時間
on:
  push:
    branches: [ "main" ] # 當你 push 程式碼時跑一次
  schedule:
    - cron: '0 */4 * * *' # 每 4 小時自動執行一次 (可以依需求調整)
  workflow_dispatch:      # 讓你可以手動按按鈕執行

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          pip install -r requirements.txt

      - name: 執行爬蟲並傳送通知
        env:
          # 這裡就是接水管的地方：左邊是程式碼用的變數，右邊是 GitHub 的 Secret
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python tracker.py
  
      - name: 保存已讀取的商品紀錄 (seen.json)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 只有在檔案存在的情況下才執行 add
          if [ -f seen.json ]; then
            git add seen.json
            # 檢查是否有內容變動，有變動才 commit，避免沒新商品時報錯
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen.json" && git push)
          else
            echo "尚未產生 seen.json，跳過本次紀錄更新"
          fi

